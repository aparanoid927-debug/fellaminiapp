<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Fella Grammar Coach</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --bg: #f5f7fa; 
            --bot-bubble: #ffffff; 
            --user-bubble: #efffde; 
            --accent: #0088cc; 
            --text-main: #222;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            color: var(--text-main);
        }
        #chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        .bubble { 
            padding: 12px 16px; 
            border-radius: 18px; 
            max-width: 85%; 
            font-size: 15px; 
            line-height: 1.5; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .bot { background: var(--bot-bubble); align-self: flex-start; border-bottom-left-radius: 4px; }
        .user { background: var(--user-bubble); align-self: flex-end; border-bottom-right-radius: 4px; }
        .label { font-size: 11px; font-weight: bold; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; display: block; }
        #input-area { padding: 12px; background: white; display: flex; gap: 8px; border-top: 1px solid #ddd; padding-bottom: env(safe-area-inset-bottom); }
        input { flex: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid #ddd; outline: none; font-size: 16px; }
        button { background: var(--accent); color: white; border: none; padding: 0 20px; border-radius: 20px; font-weight: 600; cursor: pointer; }
        button:disabled { background: #ccc; }
        strike { color: #e53935; text-decoration: line-through; }
        b { color: #2e7d32; font-weight: bold; }
    </style>
</head>
<body>
    <div id="chat-container"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Задайте вопрос...">
        <button id="send-btn" onclick="sendMessage()">Отправить</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        
        const params = new URLSearchParams(window.location.search);
        let messageCount = 0;
        const chat = document.getElementById('chat-container');
        const input = document.getElementById('user-input');

        function renderText(text) {
            if (!text) return "";
            return text
                .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                .replace(/_(.*?)_/g, '<i>$1</i>')
                .replace(/~(.*?)~/g, '<strike>$1</strike>')
                .replace(/\n/g, '<br>');
        }

        function addBubble(role, text, labelText = "") {
            const div = document.createElement('div');
            div.className = `bubble ${role}`;
            const label = labelText ? `<span class="label">${labelText}</span>` : "";
            div.innerHTML = label + renderText(text);
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function init() {
            addBubble("bot", params.get('bot_msg'), "Контекст");
            addBubble("user", `Ваш ответ: ${params.get('user_msg')}\nИсправление: ${params.get('correction')}`, "Разбор");
            
            const prompt = `Объясни грамматические ошибки в предложении: "${params.get('user_msg')}" по сравнению с "${params.get('correction')}". Отвечай только на РУССКОМ языке. Будь краток.`;
            const reply = await callAI(prompt);
            addBubble("bot", reply, "Объяснение");
        }

        async function sendMessage() {
            if (messageCount >= 10) return;
            const text = input.value.trim();
            if (!text) return;

            addBubble("user", text);
            input.value = "";
            messageCount++;

            if (messageCount >= 10) {
                input.disabled = true;
                addBubble("bot", "⚠️ Лимит сообщений исчерпан.");
                return;
            }

            const reply = await callAI(`Пользователь спрашивает про грамматику: "${text}". Отвечай на РУССКОМ.`);
            addBubble("bot", reply);
        }

        async function callAI(content) {
            try {
                const response = await fetch("https://llm-ai.hopto.org/v1/chat/completions", {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json", 
                        "Authorization": "Bearer sk-5lmG4iJ6dGdaXdgm4Z6zBSXXnd3MWXBvOnXIXSIWNtaQ53jG" 
                    },
                    body: JSON.stringify({
                        model: "gpt-5.4",
                        messages: [
                            { role: "system", content: "You are a grammar expert. Always answer in Russian. Be concise and structured." },
                            { role: "user", content }
                        ]
                    })
                });
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (e) {
                return "Ошибка подключения.";
            }
        }

        input.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
        init();
    </script>
</body>
</html>
