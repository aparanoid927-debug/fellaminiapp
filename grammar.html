<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Fella Grammar Coach</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #f5f7fa; --bot-bubble: #ffffff; --user-bubble: #efffde; --accent: #0088cc; --text-main: #222; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; color: var(--text-main); }
        #chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 15px; line-height: 1.5; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .bot { background: var(--bot-bubble); align-self: flex-start; border-bottom-left-radius: 4px; }
        .user { background: var(--user-bubble); align-self: flex-end; border-bottom-right-radius: 4px; }
        .label { font-size: 11px; font-weight: bold; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; display: block; }
        strike { color: #e53935; text-decoration: line-through; }
        b { color: #2e7d32; font-weight: bold; }
    </style>
</head>
<body>
    <div id="chat-container"></div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        
        const params = new URLSearchParams(window.location.search);
        const chat = document.getElementById('chat-container');

        function renderText(text) {
            if (!text) return "";
            return text
                .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                .replace(/_(.*?)_/g, '<i>$1</i>')
                .replace(/~(.*?)~/g, '<strike>$1</strike>')
                .replace(/\n/g, '<br>');
        }

        function addBubble(role, text, labelText = "") {
            const div = document.createElement('div');
            div.className = `bubble ${role}`;
            const label = labelText ? `<span class="label">${labelText}</span>` : "";
            div.innerHTML = label + renderText(text);
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function init() {
            const botMsg = params.get('bot_msg') || "Welcome!";
            const userMsg = params.get('user_msg') || "...";
            const correction = params.get('correction') || "...";

            addBubble("bot", botMsg, "Контекст");
            addBubble("user", `Ваш ответ: ${userMsg}\nИсправление: ${correction}`, "Разбор");
            
            try {
                const prompt = `Объясни грамматические ошибки в предложении: "${userMsg}" по сравнению с "${correction}". Отвечай только на РУССКОМ языке. Будь краток.`;
                const response = await fetch("https://llm-ai.hopto.org/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": "Bearer sk-5lmG4iJ6dGdaXdgm4Z6zBSXXnd3MWXBvOnXIXSIWNtaQ53jG" },
                    body: JSON.stringify({
                        model: "gpt-5.4",
                        messages: [{ role: "system", content: "You are a grammar expert. Always answer in Russian. Be concise." }, { role: "user", content: prompt }]
                    })
                });
                const data = await response.json();
                addBubble("bot", data.choices[0].message.content, "Объяснение");
            } catch (e) {
                addBubble("bot", "Ошибка загрузки объяснения.");
            }
        }
        init();
    </script>
</body>
</html>
