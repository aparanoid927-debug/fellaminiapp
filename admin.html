<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Smart Fella Admin</title>
  <style>
    :root{--ios-bg:#f2f2f7;--ios-accent:#007aff;--green:#34c759;--orange:#ff9500;--red:#ff3b30;--gray:#8e8e93}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--ios-bg);margin:0;padding:20px;color:#000}#login-screen{position:fixed;inset:0;background:var(--ios-bg);z-index:100;display:flex;align-items:center;justify-content:center}.card{background:white;padding:36px;border-radius:34px;width:90%;max-width:370px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.05)}input{width:100%;padding:15px;margin-bottom:15px;border-radius:15px;border:1px solid #ddd;outline:none;box-sizing:border-box;font-size:16px}.btn{padding:12px 14px;border-radius:14px;border:none;background:var(--ios-accent);color:white;font-weight:700;cursor:pointer;font-size:14px}.btn.full{width:100%;padding:15px;font-size:16px}.btn.red{background:var(--red)}.btn.gray{background:#e5e5ea;color:#111}#dashboard{display:none;max-width:1000px;margin:0 auto}.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:12px}.stats-container{display:grid;grid-template-columns:repeat(5,1fr);gap:15px;margin-bottom:20px}.stat-box{background:white;padding:18px;border-radius:24px;box-shadow:0 2px 10px rgba(0,0,0,.02)}.stat-box span{font-size:11px;color:var(--gray);font-weight:bold;text-transform:uppercase}.stat-box h2{margin:5px 0 0;font-size:28px}.user-row{background:white;padding:18px 20px;border-radius:20px;margin-bottom:10px;display:grid;grid-template-columns:1.3fr 1fr 1fr 1.3fr auto;gap:14px;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.01)}.badge{display:inline-block;padding:6px 11px;border-radius:12px;font-weight:bold;font-size:13px;background:#e9e9eb;color:#3a3a3c}.badge.paid{background:#dff7e7;color:#1f8f46}.badge.trial{background:#fff2d6;color:#a36a00}.badge.expired{background:#ffe1df;color:#b42318}.badge.free_access{background:#dbeafe;color:#1d4ed8}small{color:var(--gray)}.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.toolbar{display:flex;gap:10px;align-items:center}.search{max-width:280px;margin:0;background:white}@media(max-width:850px){.stats-container{grid-template-columns:1fr 1fr}.user-row{grid-template-columns:1fr;gap:8px}.actions{justify-content:flex-start}.header{align-items:flex-start;flex-direction:column}}
  </style>
</head>
<body>
  <div id="login-screen"><div class="card"><h1>Admin Login</h1><input id="username" placeholder="Username" autocomplete="off"><input id="password" type="password" placeholder="Password"><input id="token" type="password" placeholder="Admin API token"><button class="btn full" onclick="checkLogin()">Sign In</button></div></div>
  <div id="dashboard">
    <div class="header"><h1>Overview</h1><div class="toolbar"><input class="search" id="search" placeholder="Search user / id" oninput="renderUsers()"><button class="btn gray" onclick="fetchStats()">Update ↻</button></div></div>
    <div class="stats-container"><div class="stat-box"><span>Total Users</span><h2 id="t-users">0</h2></div><div class="stat-box"><span>Total Msgs</span><h2 id="t-msgs">0</h2></div><div class="stat-box"><span>Trial</span><h2 id="t-trial">0</h2></div><div class="stat-box"><span>Paid</span><h2 id="t-paid">0</h2></div><div class="stat-box"><span>Free Access</span><h2 id="t-free">0</h2></div></div>
    <h2>User Database</h2><div id="user-list"><div style="text-align:center;color:#8e8e93;padding:20px">Click Update to load data...</div></div>
  </div>
<script>
const API_BASE_URL = "http://212.132.99.151:9152";
let ADMIN_TOKEN = localStorage.getItem('admin_token') || ''; let USERS=[]; let refreshTimer=null; document.getElementById('token').value=ADMIN_TOKEN;
function fmt(d){return d?new Date(d).toLocaleString():'—'}
async function api(path, opts={}){opts.headers=Object.assign({'Content-Type':'application/json','X-Admin-Token':ADMIN_TOKEN},opts.headers||{});const r=await fetch(API_BASE_URL+path,opts);const data=await r.json().catch(()=>({}));if(!r.ok)throw new Error(data.error||r.status);return data;}
async function fetchStats(silent=false){try{const data=await api('/api/stats');USERS=data.users||[];document.getElementById('t-users').innerText=data.total_users;document.getElementById('t-msgs').innerText=data.total_messages;document.getElementById('t-trial').innerText=data.trial_users;document.getElementById('t-paid').innerText=data.paid_users;document.getElementById('t-free').innerText=data.free_access_users;renderUsers();}catch(e){if(!silent)alert('CONNECTION FAILED / UNAUTHORIZED. Check bot server, port 9152, browser mixed-content blocking if opened from GitHub Pages, and ADMIN_API_TOKEN.');console.error(e)}}
function renderUsers(){const q=document.getElementById('search').value.toLowerCase();const list=document.getElementById('user-list');const users=USERS.filter(u=>(String(u.id).includes(q)||(u.username||'').toLowerCase().includes(q)));if(!users.length){list.innerHTML='<div style="text-align:center;color:#8e8e93;padding:20px">No users found.</div>';return;}list.innerHTML=users.map(u=>`<div class="user-row"><div><b>@${u.username||'unknown'}</b><br><small>ID: ${u.id}</small></div><div><span class="badge ${u.payment_status}">${u.payment_status}</span><br><small>${u.free_used}/5 free used</small></div><div><b>${u.count||0}</b> msgs<br><small>Last: ${fmt(u.last)}</small></div><div><small>Payment: ${fmt(u.payment_date)}</small><br><small>Expire: ${fmt(u.paid_until)}</small></div><div class="actions">${u.free_access?`<button class="btn red" onclick="revoke(${u.id})">Revoke</button>`:`<button class="btn" onclick="grant(${u.id})">Give free</button>`}</div></div>`).join('')}
async function grant(id){const note=prompt('Note for free access:', 'Admin free access')||'Admin free access';try{await api('/api/grant-access',{method:'POST',body:JSON.stringify({user_id:id,note})});await fetchStats();}catch(e){alert('Failed to grant access')}}
async function revoke(id){if(!confirm('Revoke free/paid access for this user?'))return;try{await api('/api/revoke-access',{method:'POST',body:JSON.stringify({user_id:id})});await fetchStats();}catch(e){alert('Failed to revoke access')}}
function checkLogin(){const u=document.getElementById('username').value;const p=document.getElementById('password').value;ADMIN_TOKEN=document.getElementById('token').value;if(u==='root'&&p==='c00p00pay'&&ADMIN_TOKEN){localStorage.setItem('admin_token',ADMIN_TOKEN);document.getElementById('login-screen').style.display='none';document.getElementById('dashboard').style.display='block';fetchStats();if(refreshTimer)clearInterval(refreshTimer);refreshTimer=setInterval(()=>fetchStats(true),5000);}else alert('Invalid Credentials or missing token');}
</script>
</body>
</html>
