<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Fella Admin OS</title>
    <style>
        :root { --ios-bg: #f2f2f7; --ios-accent: #007aff; --glass: rgba(255, 255, 255, 0.7); }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--ios-bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        #login-screen { position: fixed; inset: 0; background: var(--ios-bg); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .card { background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 40px; border-radius: 40px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.3); }
        
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 15px; border: none; background: rgba(0,0,0,0.05); font-size: 16px; outline: none; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 15px; border: none; background: var(--ios-accent); color: white; font-weight: 600; cursor: pointer; }
        
        #dashboard { display: none; width: 100%; max-width: 600px; padding: 20px; box-sizing: border-box; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-box { background: white; padding: 20px; border-radius: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .stat-box span { font-size: 12px; color: #8e8e93; text-transform: uppercase; font-weight: bold; }
        .stat-box h2 { margin: 5px 0 0; font-size: 28px; }
        
        .user-list { background: white; border-radius: 25px; overflow: hidden; }
        .user-row { padding: 15px 20px; border-bottom: 1px solid #f2f2f7; display: flex; justify-content: space-between; align-items: center; }
        .user-info b { display: block; font-size: 16px; }
        .user-info small { color: #8e8e93; }
        .badge { background: #e9e9eb; padding: 4px 10px; border-radius: 10px; font-size: 12px; font-weight: 700; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="card">
            <h1 style="margin-top:0; letter-spacing:-1px;">Admin Login</h1>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="checkLogin()">Sign In</button>
        </div>
    </div>

    <div id="dashboard">
        <h1 style="font-size: 34px; letter-spacing: -1px; margin-bottom: 25px;">Dashboard</h1>
        <div class="stats-grid">
            <div class="stat-box"><span>Total Users</span><h2 id="t-users">0</h2></div>
            <div class="stat-box"><span>Messages</span><h2 id="t-msgs">0</h2></div>
        </div>
        <h2 style="font-size: 20px; margin-bottom: 15px;">Active Users</h2>
        <div class="user-list" id="user-list"></div>
    </div>

    <script>
        const API_URL = "http://212.132.99.151:9152/api/stats";

        async function fetchStats() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                document.getElementById('t-users').innerText = data.total_users;
                document.getElementById('t-msgs').innerText = data.total_messages;
                
                const list = document.getElementById('user-list');
                list.innerHTML = data.users.map(u => `
                    <div class="user-row">
                        <div class="user-info">
                            <b>@${u.username || 'unknown'}</b>
                            <small>ID: ${u.id}</small>
                        </div>
                        <span class="badge">${u.count} msgs</span>
                    </div>
                `).join('');
            } catch (e) {
                console.error("Connection failed", e);
            }
        }

        function checkLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(u === 'root' && p === 'c00p00pay') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                fetchStats();
                setInterval(fetchStats, 10000); // Auto-refresh every 10s
            } else {
                alert('Invalid Credentials');
            }
        }
    </script>
</body>
</html>
