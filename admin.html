<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Smart Fella Admin</title>
  <style>
    :root{--ios-bg:#f2f2f7;--ios-accent:#007aff;--green:#34c759;--orange:#ff9500;--red:#ff3b30;--gray:#8e8e93}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--ios-bg);margin:0;padding:20px;color:#000}#login-screen{position:fixed;inset:0;background:var(--ios-bg);z-index:100;display:flex;align-items:center;justify-content:center}.card{background:white;padding:36px;border-radius:34px;width:90%;max-width:370px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.05)}input{width:100%;padding:15px;margin-bottom:15px;border-radius:15px;border:1px solid #ddd;outline:none;box-sizing:border-box;font-size:16px}.btn{padding:12px 14px;border-radius:14px;border:none;background:var(--ios-accent);color:white;font-weight:700;cursor:pointer;font-size:14px}.btn.full{width:100%;padding:15px;font-size:16px}.btn.red{background:var(--red)}.btn.orange{background:var(--orange)}.btn.gray{background:#e5e5ea;color:#111}#dashboard{display:none;max-width:1000px;margin:0 auto}.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:12px}.stats-container{display:grid;grid-template-columns:repeat(5,1fr);gap:15px;margin-bottom:20px}.stat-box{background:white;padding:18px;border-radius:24px;box-shadow:0 2px 10px rgba(0,0,0,.02)}.stat-box span{font-size:11px;color:var(--gray);font-weight:bold;text-transform:uppercase}.stat-box h2{margin:5px 0 0;font-size:28px}.user-row{background:white;padding:18px 20px;border-radius:20px;margin-bottom:10px;display:grid;grid-template-columns:1.3fr 1fr 1fr 1.3fr auto;gap:14px;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.01)}.badge{display:inline-block;padding:6px 11px;border-radius:12px;font-weight:bold;font-size:13px;background:#e9e9eb;color:#3a3a3c}.badge.paid{background:#dff7e7;color:#1f8f46}.badge.trial{background:#fff2d6;color:#a36a00}.badge.expired{background:#ffe1df;color:#b42318}.badge.free_access{background:#dbeafe;color:#1d4ed8}small{color:var(--gray)}.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.toolbar{display:flex;gap:10px;align-items:center}.search{max-width:100%;margin-bottom:15px;background:white}.days-input{width:60px !important;padding:8px !important;margin:0 !important;border-radius:10px !important;text-align:center}.test-controls{display:flex;gap:5px;align-items:center;min-width:210px;justify-content:flex-end}@media(max-width:850px){.stats-container{grid-template-columns:1fr 1fr}.user-row{grid-template-columns:1fr;gap:8px}.actions{justify-content:flex-start}.header{align-items:flex-start;flex-direction:column}.test-controls{min-width:auto;justify-content:flex-start}}
    /* Broadcast UI Styles */
    .broadcast-card{background:white;padding:25px;border-radius:24px;margin-bottom:20px;text-align:left;box-shadow:0 4px 15px rgba(0,0,0,.03)}.tag-container{display:flex;flex-wrap:wrap;gap:8px;padding:10px;border:1px solid #ddd;border-radius:15px;margin-bottom:10px;min-height:50px;align-items:center}.tag{background:var(--ios-accent);color:white;padding:5px 10px;border-radius:10px;display:flex;align-items:center;gap:5px;font-size:14px}.tag span{cursor:pointer;font-weight:bold}.broadcast-search-input{border:none;outline:none;flex:1;min-width:150px;font-size:14px;margin:0}.suggestions{position:absolute;background:white;border:1px solid #ddd;border-radius:15px;max-height:200px;overflow-y:auto;width:100%;z-index:10;box-shadow:0 10px 20px rgba(0,0,0,0.1);display:none}.suggestion-item{padding:10px 15px;cursor:pointer;border-bottom:1px solid #f2f2f7}.suggestion-item:hover{background:var(--ios-bg)}
    /* Restrict resize to vertical only and set width */
    #b-msg{resize: vertical; width: 100%; box-sizing: border-box;}
  </style>
</head>
<body>
  <div id="login-screen"><div class="card"><h1>Admin Login</h1><input id="username" placeholder="Username" autocomplete="off"><input id="password" type="password" placeholder="Password"><input id="token" type="password" placeholder="Admin API token"><button class="btn full" onclick="checkLogin()">Sign In</button></div></div>
  <div id="dashboard">
    <div class="header"><h1>Overview</h1><div class="toolbar"><button class="btn gray" onclick="fetchStats()">Update ↻</button></div></div>
    <div class="stats-container"><div class="stat-box"><span>Total Users</span><h2 id="t-users">0</h2></div><div class="stat-box"><span>Total Msgs</span><h2 id="t-msgs">0</h2></div><div class="stat-box"><span>Trial</span><h2 id="t-trial">0</h2></div><div class="stat-box"><span>Paid</span><h2 id="t-paid">0</h2></div><div class="stat-box"><span>Free Access</span><h2 id="t-free">0</h2></div></div>
    
    <!-- BROADCAST SECTION -->
    <div class="broadcast-card">
      <h3 style="margin-top:0">📢 Broadcast Message</h3>
      <div style="position:relative">
        <div class="tag-container" id="tag-container">
          <input type="text" class="broadcast-search-input" id="b-search" placeholder="Type username to add tags (or leave empty for all)..." oninput="showSuggestions()">
        </div>
        <div class="suggestions" id="suggestions"></div>
      </div>
      <textarea id="b-msg" style="height:80px; border-radius:15px; border:1px solid #ddd; padding:15px; margin-bottom:15px; outline:none; font-family:inherit;" placeholder="Message text..."></textarea>
      <button class="btn full" onclick="sendBroadcast()">Send Broadcast</button>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <h2 style="margin: 0;">User Database</h2>
        <input class="search" id="search" style="max-width: 280px; margin: 0;" placeholder="Search user / id" oninput="renderUsers()">
    </div>
    <div id="user-list"><div style="text-align:center;color:#8e8e93;padding:20px">Click Update to load data...</div></div>
  </div>
<script>
const API_BASE_URL = "http://212.132.99.151:9152";
let ADMIN_TOKEN = localStorage.getItem('admin_token') || ''; let USERS=[]; let refreshTimer=null; document.getElementById('token').value=ADMIN_TOKEN;
let selectedUsers = [];

function fmt(d){return d?new Date(d).toLocaleString():'—'}
async function api(path, opts={}){opts.headers=Object.assign({'Content-Type':'application/json','X-Admin-Token':ADMIN_TOKEN},opts.headers||{});const r=await fetch(API_BASE_URL+path,opts);const data=await r.json().catch(()=>({}));if(!r.ok)throw new Error(data.error||r.status);return data;}

// BROADCAST LOGIC
function showSuggestions() {
    const q = document.getElementById('b-search').value.toLowerCase();
    const sug = document.getElementById('suggestions');
    if (!q) { sug.style.display = 'none'; return; }
    const filtered = USERS.filter(u => (u.username?.toLowerCase().includes(q) || String(u.id).includes(q)) && !selectedUsers.find(s => s.id === u.id));
    if (filtered.length) {
        sug.innerHTML = filtered.map(u => `<div class="suggestion-item" onclick="addTag(${u.id}, '${u.username || u.id}')">@${u.username || u.id} <small>(${u.id})</small></div>`).join('');
        sug.style.display = 'block';
    } else { sug.style.display = 'none'; }
}
function addTag(id, name) {
    selectedUsers.push({id, name});
    document.getElementById('b-search').value = '';
    document.getElementById('suggestions').style.display = 'none';
    renderTags();
}
function removeTag(id) {
    selectedUsers = selectedUsers.filter(u => u.id !== id);
    renderTags();
}
function renderTags() {
    const container = document.getElementById('tag-container');
    const input = document.getElementById('b-search');
    container.innerHTML = selectedUsers.map(u => `<div class="tag">${u.name} <span onclick="removeTag(${u.id})">×</span></div>`).join('');
    container.appendChild(input);
    input.focus();
}
async function sendBroadcast() {
    const text = document.getElementById('b-msg').value;
    if (!text) return alert("Enter message");
    if (selectedUsers.length > 0) {
        for (const u of selectedUsers) {
            await api('/api/broadcast', {method:'POST', body:JSON.stringify({text, user_id: u.id})});
        }
        alert("Sent to " + selectedUsers.length + " users");
    } else {
        const res = await api('/api/broadcast', {method:'POST', body:JSON.stringify({text})});
        alert("Sent to all (" + res.count + ") users");
    }
    document.getElementById('b-msg').value = '';
    selectedUsers = [];
    renderTags();
}

async function fetchStats(silent=false){try{const data=await api('/api/stats');USERS=data.users||[];document.getElementById('t-users').innerText=data.total_users;document.getElementById('t-msgs').innerText=data.total_messages;document.getElementById('t-trial').innerText=data.trial_users;document.getElementById('t-paid').innerText=data.paid_users;document.getElementById('t-free').innerText=data.free_access_users;renderUsers();}catch(e){if(!silent)alert('CONNECTION FAILED');console.error(e)}}
function renderUsers(){
    const q=document.getElementById('search').value.toLowerCase();
    const list=document.getElementById('user-list');
    const savedValues = {};
    document.querySelectorAll('.days-input').forEach(input => { savedValues[input.id] = input.value; });
    const users=USERS.filter(u=>(String(u.id).includes(q)||(u.username||'').toLowerCase().includes(q)));
    if(!users.length){list.innerHTML='<div style="text-align:center;color:#8e8e93;padding:20px">No users found.</div>';return;}
    list.innerHTML=users.map(u=>{
        const isTestPaid = u.payment_status === 'paid' && !u.free_access;
        const inputId = `days-${u.id}`;
        const val = savedValues[inputId] || "30";
        return `<div class="user-row"><div><b>@${u.username||'unknown'}</b><br><small>ID: ${u.id}</small></div><div><span class="badge ${u.payment_status}">${u.payment_status}</span><br><small>${u.free_used}/5 free used</small></div><div><b>${u.count||0}</b> msgs<br><small>Last: ${fmt(u.last)}</small></div><div><small>Payment: ${fmt(u.payment_date)}</small><br><small>Expire: ${fmt(u.paid_until)}</small></div><div class="actions">${u.free_access?`<button class="btn red" style="width:100px" onclick="revoke(${u.id})">Revoke</button>`:`<button class="btn" style="width:100px" onclick="grant(${u.id})">Give free</button>`}
    <div class="test-controls">
        ${!isTestPaid ? `<input type="number" class="days-input" id="${inputId}" value="${val}" min="1">` : ''}
        <button class="btn ${isTestPaid ? 'red' : 'orange'}" style="min-width:140px" onclick="toggleTestPaid(${u.id}, ${isTestPaid})">
            ${isTestPaid ? 'Reset to Trial' : 'Activate Paid Test'}
        </button>
    </div></div></div>`}).join('')
}
async function grant(id){const note=prompt('Note:')||'Admin free access';try{await api('/api/grant-access',{method:'POST',body:JSON.stringify({user_id:id,note})});await fetchStats();}catch(e){}}
async function toggleTestPaid(id, isCurrentlyPaid){try{if(isCurrentlyPaid){await api('/api/revoke-access',{method:'POST',body:JSON.stringify({user_id:id})});}else{const days=document.getElementById(`days-${id}`).value;await api('/api/test-paid',{method:'POST',body:JSON.stringify({user_id:id,days:parseInt(days)})});}await fetchStats();}catch(e){}}
async function revoke(id){if(!confirm('Revoke?'))return;try{await api('/api/revoke-access',{method:'POST',body:JSON.stringify({user_id:id})});await fetchStats();}catch(e){}}
function checkLogin(){const u=document.getElementById('username').value;const p=document.getElementById('password').value;ADMIN_TOKEN=document.getElementById('token').value;if(u==='root'&&p==='c00p00pay'&&ADMIN_TOKEN){localStorage.setItem('admin_token',ADMIN_TOKEN);document.getElementById('login-screen').style.display='none';document.getElementById('dashboard').style.display='block';fetchStats();if(refreshTimer)clearInterval(refreshTimer);refreshTimer=setInterval(()=>fetchStats(true),5000);}else alert('Invalid');}
</script>
</body>
</html>
