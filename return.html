<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Статус оплаты | Smart Fella</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #f5f7fa; --text: #1a1a1a; --accent: #0088cc; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .container { padding: 20px; background: white; border-radius: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 80%; }
        .icon { font-size: 48px; margin-bottom: 10px; }
        .btn { display: inline-block; margin-top: 20px; padding: 12px 24px; background: var(--accent); color: white; border-radius: 12px; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container" id="status-box">
        <div class="icon" id="icon">⏳</div>
        <h2 id="title">Проверка платежа...</h2>
        <p id="message">Пожалуйста, подождите немного.</p>
        <a href="#" class="btn" onclick="tg.close()">Вернуться в чат</a>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        // Check if the payment was successful (you can pass ?status=success from your backend)
        const params = new URLSearchParams(window.location.search);
        const status = params.get('status');

        const iconEl = document.getElementById('icon');
        const titleEl = document.getElementById('title');
        const msgEl = document.getElementById('message');

        if (status === 'success') {
            iconEl.innerText = '✅';
            titleEl.innerText = 'Оплата прошла!';
            msgEl.innerText = 'Теперь вам доступны все функции Smart Fella Unlimited.';[cite: 1]
        } else if (status === 'fail') {
            iconEl.innerText = '❌';
            titleEl.innerText = 'Ошибка оплаты';
            msgEl.innerText = 'Что-то пошло не так. Деньги не были списаны.';[cite: 9]
        }
    </script>
</body>
</html>
