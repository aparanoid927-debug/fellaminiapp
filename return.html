<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проверка оплаты</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f4f4f9; text-align: center; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #0088cc; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <div id="status-icon">⏳</div>
        <h2 id="status-text">Проверяем оплату...</h2>
        <p id="sub-text">Обычно это занимает несколько секунд.</p>
        <div class="loader" id="loader"></div>
        <button id="close-btn" style="display:none; padding:10px 20px; background:#0088cc; color:white; border:none; border-radius:10px;" onclick="window.Telegram.WebApp.close()">Вернуться в бот</button>
    </div>

    <script>
        const API_BASE = "http://212.132.99.151:9152"; // Твой IP
        const params = new URLSearchParams(window.location.search);
        const paymentId = localStorage.getItem('last_payment_id');
        const userId = params.get('user_id');

        async function check() {
            try {
                const r = await fetch(`${API_BASE}/api/check-payment?payment_id=${paymentId}&user_id=${userId}`);
                const data = await r.json();

                if (data.status === 'success') {
                    document.getElementById('status-icon').innerText = "✅";
                    document.getElementById('status-text').innerText = "Оплачено!";
                    document.getElementById('sub-text').innerText = "Ваша подписка активирована. Приятного обучения!";
                    document.getElementById('loader').style.display = "none";
                    document.getElementById('close-btn').style.display = "inline-block";
                } else if (data.status === 'canceled') {
                    document.getElementById('status-icon').innerText = "❌";
                    document.getElementById('status-text').innerText = "Оплата отменена";
                    document.getElementById('loader').style.display = "none";
                    document.getElementById('close-btn').style.display = "inline-block";
                } else {
                    setTimeout(check, 3000); // Проверять каждые 3 сек
                }
            } catch (e) {
                console.error(e);
                setTimeout(check, 5000);
            }
        }
        check();
    </script>
</body>
</html>
